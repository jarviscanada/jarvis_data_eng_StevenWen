# List of Jarvis projects
jarvis_projects:
  - name: "Cluster Monitor"
    git_url: "/linux_sql"
    # The project description allows hiring managers to understand your project and technologies you used(e.g. programming languages, libraries, algorithms, hardware, tools, etc.).
    # The project description must start with an action verb (https://bit.ly/3guO98u)
    description: >
      Designed and implemented a Linux-based cluster monitoring system that collects 
      host hardware specifications and real-time resource usage metrics using Bash
      scripts and PostgreSQL. Automated data collection with cron jobs and stored
      results in relational tables for analysis and reporting.

  - name: "Java Grep Apps"
    git_url: "/core_java"
    description: >
      Implemented a grep application in Core Java that recursively 
      searches large file systems using regular expressions, streams matching lines to 
      output files, and supports memory-efficient processing with Java Streams, Maven packaging, 
      logging, and Docker-based deployment.
    

  - name: "Retail Data Analytics and Wrangling"
    git_url: "/python_data_analytics"
    description: >
     Designed and implemented a data analytics proof-of-concept for a retail
     e-commerce business. Built an end-to-end analytics workflow using Python,
     Pandas, NumPy, and Matplotlib in Jupyter Notebook to clean, transform, and
     analyze transactional sales data. Performed sales trend analysis, customer
     activity analysis, cancellation analysis, and RFM-based customer segmentation
     to generate actionable business insights. Using data warehouse, PostgreSQL and Docker, 
     enabling structured analytical queries and reproducible data analysis workflows.

# List of personal or academic projects
# Feel free to add more projects
highlighted_projects:
    #project name
  - name: "miRNA–Target Interaction Prediction with HyenaDNA"
    git_url: "https://github.com/Stevenn2333/mirna-target-prediction-hyenadna"
    description: >
      Fine-tuned a HyenaDNA sequence model to predict miRNA–target interactions
      using human miRNA and mRNA 3′ UTR sequence data. Built a preprocessing pipeline
      to generate positive and negative interaction pairs, standardized variable-length
      sequences, and evaluated model performance using ROC and AUROC metrics.
      Compared pretrained and from-scratch HyenaDNA models against a CNN baseline
      and applied in-silico mutagenesis to analyze seed versus non-seed region importance.

  - name: "Credit Default Prediction with Time-Series Ensembles"
    git_url: "https://github.com/Stevenn2333/credit-default-prediction-ensembles"
    description: >
      Developed and evaluated multiple machine learning and deep learning models
      to predict customer default risk on large-scale time-series financial data
      from the American Express Kaggle challenge. Built standalone models using
      LightGBM, GRU, CNN, and Transformer architectures, applied extensive data
      preprocessing and feature engineering, and constructed a lightweight
      ensemble using weighted averaging to improve predictive performance
      under the AMEX evaluation metric.

